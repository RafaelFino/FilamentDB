manufacturer:
  name: Elegoo
  country: China
  website: https://www.elegoo.com

lines:

  - name: PLA Standard Line
    description: Entry and general-purpose PLA filaments
    positioning: balanced
    difficulty: 40
    target_use: general_printing
    notes: "Linha base PLA, fácil de imprimir e confiável"

  - name: PLA+ Line
    description: Enhanced PLA with improved strength and toughness
    positioning: improved_quality
    difficulty: 45
    target_use: functional_pla
    notes: "PLA mais resistente, melhor impacto e estabilidade"

  - name: Rapid Line
    description: High-speed optimized filaments for fast printing
    positioning: performance
    difficulty: 35
    target_use: high_speed_printing
    notes: "Otimizado para impressões rápidas"

  - name: Matte Line
    description: PLA with matte finish for aesthetic parts
    positioning: aesthetic
    difficulty: 40
    target_use: visual_quality
    notes: "Acabamento fosco, foco em estética"

  - name: Engineering Line
    description: Functional PETG/ABS materials for mechanical parts
    positioning: functional
    difficulty: 60
    target_use: mechanical_parts
    notes: "Maior resistência mecânica e térmica"

  - name: Flex Line
    description: TPU flexible materials
    positioning: flexible
    difficulty: 80
    target_use: flexible_parts
    notes: "Baixa velocidade, alta elasticidade"

