lines:

  - name: Standard Line
    description: General purpose filaments for everyday printing
    positioning: balanced
    difficulty: 40
    target_use: general_printing
    notes: "Linha base da Voolt3D, boa estabilidade e custo equilibrado"

  - name: Velvet Line
    description: Aesthetic PLA with matte/velvet finish
    positioning: aesthetic
    difficulty: 35
    target_use: visual_quality
    notes: "Foco em acabamento visual e toque fosco"

  - name: High Speed Line
    description: Optimized for fast printing on modern printers
    positioning: performance
    difficulty: 45
    target_use: high_speed_printing
    notes: "Ajustado para K2 / K1 / Bambu-like speeds"

  - name: Engineering Line
    description: Functional materials for mechanical parts
    positioning: functional
    difficulty: 60
    target_use: mechanical_parts
    notes: "Maior resistência mecânica e térmica"

  - name: Flexible Line
    description: TPU flexible materials
    positioning: flexible
    difficulty: 80
    target_use: flexible_parts
    notes: "Baixa velocidade e alta elasticidade"

