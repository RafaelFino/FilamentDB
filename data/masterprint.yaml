manufacturer:
  name: Masterprint
  country: Brazil
  website: null

lines:

  - name: Standard Line
    description: General purpose filaments for everyday printing
    positioning: balanced
    difficulty: 45
    target_use: general_printing
    notes: "Linha base, foco em custo e consistência"

  - name: Industrial Line
    description: Functional materials for mechanical parts
    positioning: functional
    difficulty: 60
    target_use: mechanical_parts
    notes: "Maior estabilidade mecânica e térmica"

  - name: Premium Line
    description: Improved quality PLA/PETG with better finish
    positioning: improved_quality
    difficulty: 50
    target_use: better_surface_finish
    notes: "Versão com melhor acabamento superficial"

  - name: Flex Line
    description: TPU flexible materials
    positioning: flexible
    difficulty: 80
    target_use: flexible_parts
    notes: "Baixa velocidade, foco em elasticidade"

