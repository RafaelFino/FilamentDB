manufacturer:
  name: Creality
  country: China
  website: https://www.creality.com

lines:

  - name: Hyper Series
    description: High-speed optimized filaments for K1/K2/Hi series
    positioning: performance
    difficulty: 25
    target_use: production_speed
    notes: "Linha principal moderna da Creality para alta velocidade"

  - name: CR Series
    description: Balanced general-purpose filaments (legacy + stable)
    positioning: balanced
    difficulty: 50
    target_use: general_printing
    notes: "Linha tradicional com boa estabilidade e ampla compatibilidade"

  - name: Ender Series
    description: Entry-level filaments for Ender printers
    positioning: beginner
    difficulty: 40
    target_use: beginner_low_cost
    notes: "Mais tolerante, menor exigência de tuning"

  - name: Hyper PLA+ Line
    description: Enhanced PLA with improved strength and speed
    positioning: performance_plus
    difficulty: 30
    target_use: functional_pla
    notes: "PLA reforçado otimizado para velocidade"

  - name: CR PETG Line
    description: Standard PETG for mechanical parts
    positioning: functional
    difficulty: 55
    target_use: mechanical_parts
    notes: "Boa resistência química e mecânica"

  - name: Hyper PETG Line
    description: High-speed PETG optimized for K2 platform
    positioning: performance
    difficulty: 45
    target_use: high_speed_petg
    notes: "PETG otimizado para fluxo alto"

  - name: ABS Industrial Line
    description: Engineering ABS for durable parts
    positioning: engineering
    difficulty: 70
    target_use: mechanical_heat_resistant
    notes: "Requer ambiente fechado"

  - name: ASA Outdoor Line
    description: UV resistant outdoor engineering filament
    positioning: engineering_outdoor
    difficulty: 75
    target_use: outdoor_parts
    notes: "Substituto do ABS para uso externo"

  - name: TPU Flex Line
    description: Flexible materials for soft parts
    positioning: flexible
    difficulty: 80
    target_use: flexible_parts
    notes: "Baixa velocidade, alta elasticidade"

