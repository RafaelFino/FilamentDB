manufacturer:
  name: Bambu Lab
  country: China
  website: https://bambulab.com

lines:

  - name: Basic Line
    description: Standard PLA/PETG materials for general use
    positioning: balanced
    difficulty: 35
    target_use: general_printing
    notes: "Linha base com excelente consistência e controle de qualidade"

  - name: Tough Line
    description: Reinforced materials with higher impact resistance
    positioning: functional
    difficulty: 45
    target_use: functional_parts
    notes: "Maior resistência mecânica que materiais básicos"

  - name: Matte Line
    description: PLA with matte finish for aesthetic parts
    positioning: aesthetic
    difficulty: 40
    target_use: visual_quality
    notes: "Acabamento fosco premium"

  - name: Silk Line
    description: Glossy PLA for decorative parts
    positioning: aesthetic
    difficulty: 45
    target_use: visual_quality
    notes: "Alto brilho, foco estético"

  - name: Engineering Line
    description: Advanced materials like PA, PC, ABS blends
    positioning: engineering
    difficulty: 75
    target_use: mechanical_heat_resistant
    notes: "Materiais técnicos de alta exigência"

  - name: Support Line
    description: Dedicated support materials (PVA, breakaway)
    positioning: support
    difficulty: 70
    target_use: support_material
    notes: "Materiais auxiliares de suporte"

