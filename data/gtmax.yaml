manufacturer:
  name: GTMax
  country: Brazil
  website: null

lines:

  - name: Standard Line
    description: General purpose filaments for everyday printing
    positioning: balanced
    difficulty: 45
    target_use: general_printing
    notes: "Linha base mais comum no mercado brasileiro"

  - name: Economy Line
    description: Low-cost filaments with higher tolerance variation
    positioning: budget
    difficulty: 55
    target_use: low_cost_printing
    notes: "Mais variação entre lotes, exige ajuste fino de perfil"

  - name: Plus Line
    description: Improved PLA/PETG with better consistency
    positioning: improved_quality
    difficulty: 50
    target_use: better_stability
    notes: "Versão mais estável da linha padrão"

  - name: Industrial Line
    description: Functional materials for mechanical applications
    positioning: functional
    difficulty: 65
    target_use: mechanical_parts
    notes: "Voltado para peças funcionais e uso técnico"

  - name: Flex Line
    description: TPU flexible materials
    positioning: flexible
    difficulty: 80
    target_use: flexible_parts
    notes: "Requer baixa velocidade e controle de retração"

