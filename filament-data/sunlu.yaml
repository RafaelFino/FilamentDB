manufacturer:
  name: Sunlu
  country: China
  website: https://www.sunlu.com
lines:
- name: PLA Standard Line
  description: General purpose PLA for everyday printing
  positioning: balanced
  difficulty: 40
  target_use: general_printing
  notes: PLA base da Sunlu, confiável e fácil de imprimir
  color_options:
  - Natural
  - Black
- name: PLA+ Line
  description: Improved strength PLA with better impact resistance
  positioning: improved_quality
  difficulty: 45
  target_use: functional_pla
  notes: PLA reforçado, bom equilíbrio geral
  color_options:
  - Natural
  - Black
- name: High Speed Line
  description: Optimized for high-speed printing up to 600mm/s
  positioning: performance
  difficulty: 35
  target_use: high_speed_printing
  notes: >
    Specs oficiais do datasheet: nozzle 210-230°C, bed 50-60°C, density 1.28 g/cm³,
    Vicat 54°C, HDT 57°C, tensile strength 39±5 MPa, flexural strength 70±5 MPa,
    impact strength 4.5±2 kJ/m², elongation 12±4%, MFI 7±2.5 g/10min.
    Suporta até 600mm/s. Tolerância diâmetro 1.75±0.02mm.
  color_options:
  - Red
  - White
  - Black
  - Yellow
  - Green
  - Grey
  - Pink
  - Sunny Orange
  - Olive Green
  - Sky Blue
  - Coral Pink
  - Jelly Green
  - Klein Blue
  - Lavender Purple
  - Mocha Mousse
- name: Meta Line
  description: Advanced PLA with improved flow and surface finish
  positioning: performance_plus
  difficulty: 40
  target_use: advanced_pla
  notes: Melhor fluidez e acabamento superficial, formulação avançada
  color_options:
  - Natural
  - Black
  - White
  - Grey
  - Red
  - Blue
  - Green
  - Yellow
- name: Silk Line
  description: Glossy aesthetic PLA for visual parts
  positioning: aesthetic
  difficulty: 45
  target_use: visual_quality
  notes: Acabamento brilhante, foco estético
  color_options:
  - White
  - Natural
  - Silver
  - Gold
  - Copper
  - Rainbow
- name: PETG Line
  description: Functional PETG for mechanical parts
  positioning: functional
  difficulty: 55
  target_use: mechanical_parts
  notes: Boa resistência mecânica e química
  color_options:
  - Natural
  - Black
- name: ABS Line
  description: Engineering ABS for high strength parts
  positioning: engineering
  difficulty: 70
  target_use: mechanical_heat_resistant
  notes: Requer ambiente fechado para melhor resultado
  color_options:
  - Natural
  - Black
- name: TPU Line
  description: Flexible TPU materials
  positioning: flexible
  difficulty: 80
  target_use: flexible_parts
  notes: Baixa velocidade, alta elasticidade
  color_options:
  - Natural
  - Black
  - Gray
