manufacturer:
  name: Voolt3D
  country: Brazil
  website: https://voolt3d.com.br
  notes: Maior fabricante nacional de filamentos para impressão 3D, 100% desenvolvidos e produzidos no Brasil. Sede em São Bernardo do Campo, SP.
lines:
- name: Standard Line
  description: PLA de uso geral com boa estabilidade e custo equilibrado
  positioning: balanced
  difficulty: 40
  target_use: general_printing
  notes: Linha base da Voolt3D, boa estabilidade e custo equilibrado
  color_options:
  - Natural
  - Black
  - White
- name: Velvet Line
  description: PLA estético com acabamento aveludado/matte, tecnologia de expansão exclusiva
  positioning: aesthetic
  difficulty: 35
  target_use: visual_quality
  notes: Foco em acabamento visual e toque fosco. Reduz visibilidade de camadas, pode ser lixado. High Speed Premium.
  color_options:
  - Preto
  - Branco
  - Bege Caucasiano
  - Vermelho
  - Azul
  - Cinza Claro
  - Verde Oliva
  - Amarelo
  - Branco Off White
  - Marrom
  - Verde
  - Marrom Cappuccino
  - Cinza Grafite
  - Verde Macaron
- name: V-Silk Line
  description: PLA com acabamento sedoso/metálico
  positioning: aesthetic
  difficulty: 38
  target_use: visual_quality
  notes: Acabamento silk com reflexo metálico
  color_options:
  - Dourado
  - Inox
- name: High Speed Line
  description: PLA otimizado para alta velocidade em impressoras modernas
  positioning: performance
  difficulty: 45
  target_use: high_speed_printing
  notes: Otimizado para alta velocidade. Max volumetric speed até 25 mm³/s.
  color_options:
  - Natural
  - Black
  - White
- name: Engineering Line
  description: Materiais funcionais para peças mecânicas (PETG, ABS, PETG CF)
  positioning: functional
  difficulty: 60
  target_use: mechanical_parts
  notes: Maior resistência mecânica e térmica
  color_options:
  - Black
  - White
  - Natural
- name: Flexible Line
  description: TPU flexível
  positioning: flexible
  difficulty: 80
  target_use: flexible_parts
  notes: Baixa velocidade e alta elasticidade
  color_options:
  - Natural
  - Black
  - Gray
