manufacturer:
  name: 3DLab
  country: Brazil
  website: https://3dlab.com.br
  notes: >
    Fabricante brasileiro sediado em Betim, MG (fábrica), com presença em Belo Horizonte e São Paulo.
    Utiliza matéria-prima NatureWorks (considerada a melhor do mundo para impressão 3D).
    Tolerância dimensional: ±0,05mm. Embalagem zip à vácuo com sílica, metalizada para proteção UV.
    Garantia: 3 meses.
lines:
- name: Standard/Premium Line
  description: PLA Premium com matéria-prima NatureWorks, nomes poéticos exclusivos
  positioning: balanced
  difficulty: 45
  target_use: general_printing
  notes: Linha principal da 3DLab. Alta consistência de lote e dimensão.
  color_options:
  - Preto Eclipse
  - Branco Aurora
  - Cinza Urbano
  - Vermelho Pulse
  - Amarelo Solar
  - Azul Horizonte
  - Verde Campo
  - Laranja Energia
  - Crystal Clear
  - Marrom Terra
  - Azul Céu
  - Rosa Blush
  - Roxo Cósmico
  - Prata Alumínio
  - Bege Natural
  - Areia Duna
  - Azul Vitral
  - Lilás Lavanda
  - Verde Abacate
  - Mármore Carrara
- name: Candy Colors Line
  description: PLA em cores vivas e saturadas estilo candy
  positioning: aesthetic
  difficulty: 45
  target_use: visual_quality
  notes: Cores altamente saturadas e vivas
  color_options:
  - Variado
- name: Cetim Line
  description: PLA com acabamento acetinado/cetim
  positioning: aesthetic
  difficulty: 45
  target_use: visual_quality
  notes: Acabamento entre matte e gloss, semibrilho suave
  color_options:
  - Variado
- name: Hyper Line
  description: PLA de alta velocidade para impressoras modernas
  positioning: performance
  difficulty: 48
  target_use: high_speed_printing
  notes: Otimizado para velocidades elevadas (high speed)
  color_options:
  - Preto Carbono
  - Branco Polar
  - Azul Industrial
  - Verde Engineering
  - Cinza Técnico
  - Amarelo Safety
  - Vermelho Alert
- name: HT Impact Line
  description: PLA com alta resistência ao impacto
  positioning: functional
  difficulty: 50
  target_use: mechanical_parts
  notes: Maior tenacidade que o PLA convencional
  color_options:
  - Variado
- name: Silk Line
  description: PLA com acabamento sedoso/silk
  positioning: aesthetic
  difficulty: 45
  target_use: visual_quality
  notes: Reflexo suave e sedoso
  color_options:
  - Variado
- name: Ultra Silk Line
  description: PLA Ultra Silk com acabamento metalizado intenso
  positioning: aesthetic
  difficulty: 45
  target_use: visual_quality
  notes: Versão premium do silk com acabamento mais intenso
  color_options:
  - Variado
- name: Ultra Silk Bicolor Line
  description: PLA Ultra Silk com efeito bicolor/multicolor
  positioning: aesthetic
  difficulty: 47
  target_use: visual_quality
  notes: Combinação de duas cores com acabamento silk
  color_options:
  - Variado
- name: Rainbow Line
  description: PLA arco-íris com troca de cor ao longo do filamento
  positioning: aesthetic
  difficulty: 45
  target_use: visual_quality
  notes: Transições de cor automáticas durante a impressão
  color_options:
  - Rainbow
- name: Special Line
  description: "Filamentos especiais: Neon, Mármore, Glow Reactor, Wood, etc."
  positioning: aesthetic
  difficulty: 50
  target_use: visual_quality
  notes: Efeitos visuais diferenciados
  color_options:
  - Neon
  - Mármore
  - Glow Reactor
  - Wood
- name: ABS Premium Line
  description: ABS Premium com matéria-prima de qualidade
  positioning: functional
  difficulty: 65
  target_use: mechanical_parts
  notes: ABS com boa resistência mecânica e térmica
  color_options:
  - Preto Eclipse
  - Branco Dental
  - Natural Engineering
  - Cinza Urbano
- name: PETG Line
  description: PETG com matéria-prima certificação europeia FoodSafe
  positioning: functional
  difficulty: 55
  target_use: mechanical_parts
  notes: Alta resistência mecânica, química e térmica. Certificação FoodSafe europeia.
  color_options:
  - Preto Eclipse
  - Branco Aurora
  - Crystal Clear
  - Low Cost
- name: TPU Flex Line
  description: TPU flexível 98A
  positioning: flexible
  difficulty: 75
  target_use: flexible_parts
  notes: Alta elasticidade, dureza 98A Shore
  color_options:
  - Variado
- name: TPU Semi Flex Line
  description: TPU semi-flexível 65D
  positioning: flexible
  difficulty: 60
  target_use: flexible_parts
  notes: Semi-rígido, dureza 65D Shore
  color_options:
  - Variado
- name: PCV Line
  description: Linha especial PCV
  positioning: functional
  difficulty: 70
  target_use: mechanical_parts
  notes: Material especial PCV
  color_options:
  - Variado
- name: Low Cost Line
  description: Filamentos econômicos para uso geral
  positioning: budget
  difficulty: 40
  target_use: general_printing
  notes: Melhor custo-benefício
  color_options:
  - Variado
